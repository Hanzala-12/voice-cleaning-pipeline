# Voice Cleaning Pipeline Configuration

audio:
  sample_rate: 16000  # 16kHz for optimal processing
  chunk_duration: 30  # seconds per chunk for processing
  
vad:
  # Pre-VAD trim settings
  aggressiveness: 3  # 0-3, higher = more aggressive filtering
  frame_duration_ms: 30  # 10, 20, or 30 ms
  padding_duration_ms: 300  # padding around speech segments
  min_speech_duration_ms: 250  # minimum speech segment length
  
deepfilternet:
  model: "DeepFilterNet3"  # DeepFilterNet2 or DeepFilterNet3
  post_filter: true  # additional post-processing
  
silent_bed:
  fade_duration_ms: 20  # crossfade duration for transplant
  preserve_original_silence: true  # keep original silent portions

adaptive_processing:
  enabled: true  # route clean clips to lighter DSP and noisy clips to DeepFilterNet

restoration:
  enabled: true  # restore speech brightness after stronger denoising
  heavy_only: true  # only restore after the heavy path is selected

speech_blend:
  background_gain: 0.0  # 0 = pure silence outside speech segments
  energy_threshold: 0.015  # lower = stronger use of original bed in low-energy speech pockets
  
diarization:
  enabled: true
  min_speakers: 1
  max_speakers: 10
  
asr:
  skip: true   # PAUSED - set false to re-enable transcription
  model: "turbo"  # tiny, base, small, medium, large, large-v3, turbo (recommended)
  language: null  # auto-detect if null
  compute_type: "int8"  # int8 (fastest on CPU), float16, or float32
  device: "cpu"  # cpu or cuda (auto-detect if not set)
  
cache:
  enabled: false  # DISABLED for testing new voice isolation architecture
  
output:
  format: "wav"  # wav, mp3, flac
  bit_depth: 16  # 16 or 24 for wav
  preserve_video: true  # if input is video, merge cleaned audio back
