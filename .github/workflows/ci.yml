name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --no-cache-dir setuptools==68.0.0 wheel
        python -m pip install --upgrade --no-cache-dir pip
        pip install --no-cache-dir -r requirements-prod.txt --timeout 300
        pip install --no-cache-dir -r requirements-dev.txt
      env:
        PIP_DEFAULT_TIMEOUT: 300
        PIP_NO_BUILD_ISOLATION: 0
    
    - name: Verify and fix setuptools before tests
      run: |
        python -c "import pkg_resources; print('pkg_resources: OK')"
        python -c "import setuptools; print('setuptools:', setuptools.__version__)"
        python -c "import webrtcvad; print('webrtcvad: OK')"
    
    - name: Run pre-commit checks (black + flake8)
      run: |
        pre-commit run --all-files
    
    - name: Run tests
      run: |
        pytest tests/ --cov=src --cov=backend --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
    
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t voice-cleaning:${{ github.sha }} .
    
    - name: Save Docker image
      run: |
        docker save voice-cleaning:${{ github.sha }} | gzip > voice-cleaning.tar.gz
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: voice-cleaning.tar.gz
